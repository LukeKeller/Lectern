version = "1.0"

[main]
name = "Configuration"

    [main.newsletters]
    name = "Newsletter ingestion"

        [main.newsletters.newsletters_help]
        type = "alert"
        style = "info"
        ask = "Read email newsletters from a dedicated IMAP mailbox into your library. Subscribe newsletters to a mailbox nothing else reads, then point Lectern at it here. Leave the host empty to turn ingestion off. Lectern checks the mailbox every 5 minutes (background jobs must be enabled)."

        [main.newsletters.imap_host]
        ask = "IMAP host"
        type = "string"
        example = "mail.example.com"
        help = "Use the mail server's certificate hostname (e.g. your mail domain), NOT 'localhost' — a TLS connection to 'localhost' fails the certificate name check even on the same server."
        optional = true

        [main.newsletters.imap_port]
        ask = "IMAP port"
        type = "number"
        default = 993
        help = "993 for implicit TLS (recommended), 143 for STARTTLS/plain."

        [main.newsletters.imap_user]
        ask = "IMAP username"
        type = "string"
        example = "read@digitallyadrift.com"
        optional = true

        [main.newsletters.imap_password]
        ask = "IMAP password"
        type = "password"
        optional = true

        [main.newsletters.imap_exclude_senders]
        ask = "Ignore senders"
        type = "string"
        example = "diagnosis@digitallyadrift.com, noreply@example.com"
        help = "Comma-separated From addresses to skip — handy for internal or system mail (server diagnostics, cron) that lands in this mailbox. Case-insensitive, exact-match."
        optional = true

    [main.tts]
    name = "Text-to-speech"

        [main.tts.tts_help]
        type = "alert"
        style = "info"
        ask = "Lectern can read articles aloud. ElevenLabs works with an API key set on the in-app Settings > Listen page (no server config needed). For a free self-hosted voice, run one of two local engines and put its URL below. Kokoro-FastAPI (Docker, ~2GB RAM) — recommended (CPU) container: docker run -d --name kokoro-tts --restart unless-stopped -p 127.0.0.1:8880:8880 ghcr.io/remsky/kokoro-fastapi-cpu:latest (NVIDIA GPU: use ghcr.io/remsky/kokoro-fastapi-gpu:latest). Piper — a much lighter CPU-only engine, ideal for minimal VPS hardware: pip install piper-tts then run python3 -m piper.http_server -m en_US-lessac-medium --data-dir <dir> --host 127.0.0.1 --port 5000 (requires ffmpeg on the server; see docs/piper-tts.md). Then pick 'Kokoro (self-hosted)' or 'Piper' as the provider on the in-app Settings > Listen page."

        [main.tts.kokoro_base_url]
        ask = "Kokoro-FastAPI base URL"
        type = "string"
        default = "http://127.0.0.1:8880"
        help = "Base URL of the self-hosted Kokoro-FastAPI service. Lectern appends OpenAI-compatible paths (/v1/audio/speech, /v1/audio/voices). The default matches the recommended Docker run command, which binds the service to localhost on this server."
        optional = true

        [main.tts.piper_base_url]
        ask = "Piper base URL"
        type = "url"
        default = "http://127.0.0.1:5000"
        help = "Base URL of the self-hosted Piper HTTP service. Lectern POSTs to /synthesize and reads /voices, then transcodes Piper's WAV output to mp3 (ffmpeg must be installed on the server). The default matches the recommended run command (python3 -m piper.http_server ... --host 127.0.0.1 --port 5000), which binds the service to localhost on this server. See docs/piper-tts.md."
        optional = true
