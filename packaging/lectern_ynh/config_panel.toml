version = "1.0"

[main]
name = "Configuration"

    [main.newsletters]
    name = "Newsletter ingestion"

        [main.newsletters.newsletters_help]
        type = "alert"
        style = "info"
        ask = "Read email newsletters from a dedicated IMAP mailbox into your library. Subscribe newsletters to a mailbox nothing else reads, then point Lectern at it here. Leave the host empty to turn ingestion off. Lectern checks the mailbox every 5 minutes (background jobs must be enabled). These settings are the source of truth — /var/www/lectern/.env is re-rendered from them on every upgrade, so never hand-edit it on the server. Proton Bridge and self-signed certificates: see docs/newsletters.md."

        [main.newsletters.imap_host]
        ask = "IMAP host"
        type = "string"
        example = "mail.example.com"
        help = "Must match the name on the mail server's certificate. For a remote mail server that is your mail domain, NOT 'localhost' — a TLS connection to 'localhost' fails the certificate name check even on the same server. A local gateway follows the same rule but resolves differently: Proton Bridge issues its certificate for CN=127.0.0.1, so use 127.0.0.1 there (still not 'localhost')."
        optional = true

        [main.newsletters.imap_port]
        ask = "IMAP port"
        type = "number"
        default = 993
        help = "993 for implicit TLS (recommended), 143 for STARTTLS/plain, 1143 for Proton Bridge."

        [main.newsletters.imap_secure]
        ask = "Implicit TLS"
        type = "boolean"
        yes = "1"
        no = "0"
        default = "1"
        help = "On = the connection is TLS from the first byte, which is what port 993 expects. Off = connect in the clear then upgrade with STARTTLS, which is what ports 143 and 1143 expect — Proton Bridge is in this second group, so turn this OFF for it. Off does not mean unencrypted: STARTTLS is still negotiated and the certificate is still verified."

        [main.newsletters.imap_mailbox]
        ask = "Mailbox"
        type = "string"
        default = "INBOX"
        example = "INBOX"
        help = "IMAP folder to read newsletters from. Leave as INBOX unless you file them into a subfolder (e.g. 'INBOX/Newsletters'). Cleared = INBOX."

        [main.newsletters.imap_user]
        ask = "IMAP username"
        type = "string"
        example = "read@digitallyadrift.com"
        optional = true

        [main.newsletters.imap_password]
        ask = "IMAP password"
        type = "password"
        optional = true

        [main.newsletters.imap_exclude_senders]
        ask = "Ignore senders"
        type = "string"
        example = "diagnosis@digitallyadrift.com, noreply@example.com"
        help = "Comma-separated From addresses to skip — handy for internal or system mail (server diagnostics, cron) that lands in this mailbox. Case-insensitive, exact-match."
        optional = true

        [main.newsletters.imap_ingest_backlog]
        ask = "Import existing mail (one-off)"
        type = "boolean"
        yes = "1"
        no = "0"
        default = "0"
        help = "ONE-OFF SWITCH — turn it on, let a single poll run (up to 5 minutes), then turn it back OFF. Normally Lectern only ingests mail that arrives after it starts watching. Leaving this on means every UIDVALIDITY reset — which happens on every Proton Bridge restart, and on any host/username change — re-imports the entire mailbox from scratch."

        [main.newsletters.node_extra_ca_certs]
        ask = "Extra CA certificate (path)"
        # Deliberately "string", not "path": YunoHost's path type normalizes to a
        # URL path — it would turn an empty value into "/", and Node would then
        # warn on every TLS handshake about failing to load "/" as a cert.
        type = "string"
        example = "/var/www/lectern/bridge-cert.pem"
        help = "Only needed when the IMAP server presents a self-signed certificate — Proton Bridge is the usual case (its cert is at ~/.config/protonmail/bridge-v3/cert.pem; copy it somewhere the lectern user can read, e.g. /var/www/lectern/bridge-cert.pem owned lectern:lectern mode 640). This ADDS a trusted root; certificate verification stays fully on, so a wrong hostname or expired cert still fails. Leave empty for a normal publicly-trusted mail server. Must be a file that exists — a bad path makes Node warn on every connection."
        optional = true

    [main.tts]
    name = "Text-to-speech"

        [main.tts.tts_help]
        type = "alert"
        style = "info"
        ask = "Lectern can read articles aloud. ElevenLabs works with an API key set on the in-app Settings > Listen page (no server config needed). For a free self-hosted voice, run one of two local engines and put its URL below. Kokoro-FastAPI (Docker, ~2GB RAM) — recommended (CPU) container: docker run -d --name kokoro-tts --restart unless-stopped -p 127.0.0.1:8880:8880 ghcr.io/remsky/kokoro-fastapi-cpu:latest (NVIDIA GPU: use ghcr.io/remsky/kokoro-fastapi-gpu:latest). Piper — a much lighter CPU-only engine, ideal for minimal VPS hardware: pip install 'piper-tts[http]' then run python3 -m piper.http_server -m en_US-lessac-medium --data-dir <dir> --host 127.0.0.1 --port 5000 (requires ffmpeg on the server; see docs/piper-tts.md). Then pick 'Kokoro (self-hosted)' or 'Piper' as the provider on the in-app Settings > Listen page."

        [main.tts.kokoro_base_url]
        ask = "Kokoro-FastAPI base URL"
        type = "string"
        default = "http://127.0.0.1:8880"
        help = "Base URL of the self-hosted Kokoro-FastAPI service. Lectern appends OpenAI-compatible paths (/v1/audio/speech, /v1/audio/voices). The default matches the recommended Docker run command, which binds the service to localhost on this server."
        optional = true

        [main.tts.piper_base_url]
        ask = "Piper base URL"
        type = "url"
        default = "http://127.0.0.1:5000"
        help = "Base URL of the self-hosted Piper HTTP service. Lectern POSTs text to the root route (POST /) and reads /voices, then transcodes Piper's WAV output to mp3 (ffmpeg must be installed on the server). The default matches the recommended run command (python3 -m piper.http_server ... --host 127.0.0.1 --port 5000), which binds the service to localhost on this server. See docs/piper-tts.md."
        optional = true
