#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json
packaging_format = 2

id = "lectern"
name = "Lectern"
description.en = "Self-hosted RSS + read-later reader (unifies MiniFlux + Readeck)"

version = "0.24.4~ynh1"
maintainers = ["lukekeller"]

[upstream]
license = "AGPL-3.0-only"
code = "https://github.com/LukeKeller/Lectern"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = false
ldap = true
sso = true
disk = "300M"
ram.build = "50M"
ram.runtime = "250M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

    [install.miniflux_url]
    ask.en = "MiniFlux base URL (no trailing slash)"
    type = "string"
    example = "https://read.p10.club/miniflux"

    [install.miniflux_token]
    ask.en = "MiniFlux API token (Settings -> API Keys)"
    type = "password"

    [install.readeck_url]
    ask.en = "Readeck base URL (no trailing slash)"
    type = "string"
    example = "https://readeck.p10.club"

    [install.readeck_token]
    ask.en = "Readeck API token (Profile -> API Tokens)"
    type = "password"

    [install.imap_host]
    ask.en = "Newsletter mailbox IMAP host (optional; leave blank to disable newsletter ingestion)"
    help.en = "A dedicated mailbox the app reads newsletters from. On this server, use 'localhost'."
    type = "string"
    default = ""
    optional = true

    [install.imap_user]
    ask.en = "Newsletter mailbox IMAP username (e.g. read@your.domain)"
    type = "string"
    default = ""
    optional = true

    [install.imap_password]
    ask.en = "Newsletter mailbox IMAP password"
    type = "password"
    optional = true

[resources]
    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    # The PWA/Android client authenticates to /api with the app's own bearer
    # token (not SSOwat). auth_header=false stops SSOwat from 302-ing those
    # requests to the login portal; the nginx public regex (conf/nginx.conf)
    # preserves the Authorization header. Keep both in sync.
    api.url = "/api"
    # PWA app-shell assets are fetched WITHOUT credentials (the Web App Manifest
    # and its icons), so they must be visitor-accessible or the installed app
    # has no icon/name. SSOwat (access.lua) gates by permission, so listing them
    # here — not just in nginx — is what actually makes them public.
    api.additional_urls = [
        "/manifest.webmanifest",
        "/icon.svg",
        "/icon-192.png",
        "/icon-512.png",
        "/icon-maskable-192.png",
        "/icon-maskable.png",
        "/apple-touch-icon.png",
        "/robots.txt",
    ]
    api.allowed = "visitors"
    api.auth_header = false
    api.show_tile = false
    api.protected = true
    # Podcast apps (Apple Podcasts, Pocket Casts, …) can't authenticate through
    # SSOwat — there's no interactive login — so the feed + episode audio must be
    # visitor-accessible at the perimeter. The BFF itself gates these routes with
    # an opaque token baked into the URL. Keep in sync with the /podcast location
    # in conf/nginx.conf.
    podcast.url = "/podcast"
    podcast.allowed = "visitors"
    podcast.auth_header = false
    podcast.show_tile = false
    podcast.protected = true

    [resources.ports]
    main.default = 8787

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "22"
