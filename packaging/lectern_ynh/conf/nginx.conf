# Public bearer-token API: the PWA/Android client authenticates with the app's
# own token, not SSOwat. Bypass SSO here and preserve the Authorization header
# (SSOwat would otherwise 302 to the login portal and/or strip the header).
# Keep this regex in sync with api.url in manifest.toml.
location ~ ^__PATH__/api(/.*)?$ {
    set $bearer $http_authorization;
    proxy_pass http://127.0.0.1:__PORT__;
    include proxy_params;
    proxy_set_header Authorization $bearer;
    proxy_redirect off;
    client_max_body_size 50M;
}

# Public, token-gated podcast feed + episode audio. Podcast apps can't log in
# through SSOwat, so bypass SSO here; the BFF gates these routes with an opaque
# token in the URL. No Authorization header is involved (the token is in the
# path), and nginx proxies Range requests through for audio seeking. Keep this
# regex in sync with the podcast permission in manifest.toml.
location ~ ^__PATH__/podcast(/.*)?$ {
    proxy_pass http://127.0.0.1:__PORT__;
    include proxy_params;
    proxy_redirect off;
}

# PWA app-shell assets must be publicly fetchable. The browser requests the Web
# App Manifest (and, transitively, its icons) WITHOUT credentials, so SSO-gating
# them makes the manifest fetch 302 to the portal — the installed app then has
# no icon or name. The apple-touch-icon and favicon are fetched the same way.
# These are non-sensitive shell assets, so bypass SSO like the /api block above.
location ~ ^__PATH__/(manifest\.webmanifest|icon\.svg|icon-192\.png|icon-512\.png|icon-maskable\.png|apple-touch-icon\.png|robots\.txt)$ {
    proxy_pass http://127.0.0.1:__PORT__;
    include proxy_params;
    proxy_redirect off;
}

# SSO-gated SPA + the BFF's non-API routes (the BFF trusts the injected
# Ynh-User header from proxy_params_with_auth).
location __PATH__/ {
    proxy_pass http://127.0.0.1:__PORT__;
    include proxy_params_with_auth;
    proxy_redirect off;
    client_max_body_size 50M;
}
