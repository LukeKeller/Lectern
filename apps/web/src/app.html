<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Lectern</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<!-- Status bar / system-chrome colour. A SINGLE theme-color tag (not two
		     media-scoped ones): in a standalone PWA window the browser does NOT
		     re-evaluate media-scoped theme-color tags after the app forces a theme,
		     so it stays stuck on the launch colour. One tag we set imperatively —
		     here pre-paint, then kept in sync by reader-settings — actually tracks
		     the active theme. `auto` resolves against the OS scheme. Mirrors `--bg`. -->
		<meta name="theme-color" content="#f6f4ee" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Lectern" />
		<link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<script>
			// Apply the saved theme + matching system-chrome colour before first paint
			// so the PWA status/nav bars never flash (or stick on) the wrong colour.
			(function () {
				try {
					var LIGHT = '#f6f4ee',
						DARK = '#1a1815';
					var raw = localStorage.getItem('lectern.reader');
					var t = raw ? JSON.parse(raw).theme || 'auto' : 'auto';
					if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
					var dark =
						t === 'dark' ||
						(t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
					var meta = document.querySelector('meta[name="theme-color"]');
					if (meta) meta.setAttribute('content', dark ? DARK : LIGHT);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
