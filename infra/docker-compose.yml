name: lectern-dev

# Local development backends for Lectern.
# NOTE: env keys / image tags here are a starting point and are validated in D1
# (the backend provisioning + API spike). Production uses native YunoHost packages.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: lectern
      POSTGRES_PASSWORD: lectern
      POSTGRES_DB: lectern
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lectern"]
      interval: 5s
      timeout: 5s
      retries: 10

  miniflux:
    image: miniflux/miniflux:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://lectern:lectern@postgres:5432/miniflux?sslmode=disable"
      RUN_MIGRATIONS: "1"
      CREATE_ADMIN: "1"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "adminpass"
      BASE_URL: "http://localhost:8088/"
    ports:
      - "8088:8080"

  readeck:
    image: codeberg.org/readeck/readeck:latest
    environment:
      READECK_SERVER_HOST: "0.0.0.0"
      READECK_SERVER_PORT: "8000"
      READECK_SERVER_BASE_URL: "http://localhost:8089/"
    ports:
      - "8089:8000"
    volumes:
      - readeckdata:/readeck

volumes:
  pgdata:
  readeckdata:
